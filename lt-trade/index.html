<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT 04 OL 交換平台 🔄</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 960px; margin: 0 auto; padding: 16px; }

.header { text-align:center; padding:20px 0 8px; border-bottom:1px solid #1e1e2e; margin-bottom:16px; }
.header h1 { font-size:1.4rem; color:#fff; }
.header .sub { font-size:0.8rem; color:#888; margin-top:4px; }
.header .me-badge { display:inline-block; background:#533afd22; color:#a99bff; padding:2px 10px; border-radius:10px; font-size:0.75rem; margin-top:6px; }

/* Tab nav */
.tab-nav { display:flex; gap:0; margin-bottom:16px; border-bottom:1px solid #1e1e2e; }
.tab-btn { flex:1; padding:10px; background:none; border:none; color:#666; font-size:0.85rem; cursor:pointer; border-bottom:2px solid transparent; }
.tab-btn.active { color:#a99bff; border-bottom-color:#533afd; }
.tab-btn .badge { background:#f87171; color:#fff; font-size:0.65rem; padding:1px 6px; border-radius:8px; margin-left:4px; }

/* Summary Table */
.summary-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
.summary-table th { text-align:left; padding:10px 8px; border-bottom:1px solid #1e1e2e; color:#888; font-size:0.75rem; font-weight:600; }
.summary-table td { padding:12px 8px; border-bottom:1px solid #12121a; vertical-align:top; }
.summary-table .st-name { font-weight:700; color:#fff; font-size:0.9rem; }
.summary-table .st-contact { color:#666; font-size:0.7rem; }
.summary-table .st-me { color:#a99bff; font-size:0.65rem; }
.summary-table .st-action { margin-top:6px; }
.summary-table .st-action button { margin-right:4px; margin-bottom:4px; }
.summary-table .st-figs { display:flex; flex-wrap:wrap; gap:4px; align-items:flex-start; }
.summary-table .st-fig { position:relative; display:inline-block; }
.summary-table .st-fig img { width:44px; height:44px; object-fit:contain; border-radius:4px; background:#0d0d15; }
.summary-table .st-fig .st-qty { position:absolute; top:-4px; right:-4px; font-size:0.55rem; font-weight:700; padding:0 4px; border-radius:6px; line-height:1.3; }
.summary-table .st-fig .st-qty.out-qty { background:#4ade80; color:#0a0a0f; }
.summary-table .st-fig .st-qty.want-qty { background:#f87171; color:#fff; }
.summary-table .st-col-out .st-fig img { border:1px solid #4ade8044; }
.summary-table .st-col-want .st-fig img { border:1px solid #f8717144; }
.summary-table .st-empty { color:#333; font-size:0.75rem; }

/* Small buttons */
.btn-sm { background:none; border:1px solid #2a2a3a; color:#888; padding:5px 14px; border-radius:14px; cursor:pointer; font-size:0.75rem; }
.btn-sm:hover { border-color:#533afd; color:#a99bff; }
.btn-sm.danger:hover { border-color:#5a1a2a; color:#f87171; }
.btn-sm.trade { border-color:#f59e0b44; color:#f59e0b; }
.btn-sm.trade:hover { border-color:#f59e0b; background:#f59e0b11; }

/* Request cards */
.req-card { background:#13131a; border:1px solid #f59e0b44; border-radius:12px; padding:16px; margin-bottom:12px; }
.req-card .r-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.req-card .r-title { color:#f59e0b; font-weight:700; font-size:0.9rem; }
.req-card .r-from { color:#888; font-size:0.8rem; }
.req-card .r-items { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.req-card .r-items img { width:44px; height:44px; object-fit:contain; border-radius:6px; background:#0d0d15; }
.req-card .r-arrow { display:flex; align-items:center; justify-content:center; color:#f59e0b; font-size:1.2rem; padding:0 6px; }
.req-card .r-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.req-card .r-label { font-size:0.7rem; color:#888; min-width:70px; }
.req-card .r-actions { display:flex; gap:8px; margin-top:8px; }
.btn-accept { background:#4ade8011; border:1px solid #4ade8044; color:#4ade80; padding:6px 16px; border-radius:14px; cursor:pointer; font-size:0.8rem; }
.btn-accept:hover { background:#4ade8022; }
.btn-reject { background:#f8717111; border:1px solid #f8717144; color:#f87171; padding:6px 16px; border-radius:14px; cursor:pointer; font-size:0.8rem; }
.btn-reject:hover { background:#f8717122; }

/* Edit Panel */
.edit-panel { background:#13131a; border:1px solid #1e1e2e; border-radius:12px; padding:16px; margin-bottom:16px; }
.edit-panel h2 { font-size:1rem; color:#fff; margin-bottom:12px; }
.edit-panel input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #2a2a3a; background:#0d0d15; color:#e0e0e0; font-size:0.9rem; margin-bottom:8px; }
.edit-panel input:focus { outline:none; border-color:#533afd; }

.set-section { margin-top:12px; }
.set-section h3 { font-size:0.85rem; color:#aaa; margin-bottom:8px; }
.fig-grid { display:flex; flex-wrap:wrap; gap:8px; }
.fig-item { width:85px; text-align:center; padding:4px; border-radius:8px; border:2px solid #1e1e2e; transition:all .15s; }
.fig-item img { width:100%; height:52px; object-fit:contain; border-radius:4px; background:#0d0d15; }
.fig-item .fig-name { font-size:0.55rem; color:#666; margin-top:1px; line-height:1.1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fig-item .fig-inputs { display:flex; gap:2px; margin-top:3px; }
.fig-item .fig-inputs label { flex:1; display:flex; align-items:center; gap:1px; font-size:0.55rem; color:#555; }
.fig-item .fig-inputs input { width:100%; padding:1px 2px; font-size:0.6rem; text-align:center; border:1px solid #2a2a3a; border-radius:3px; background:#0d0d15; color:#ccc; -moz-appearance:textfield; }
.fig-item .fig-inputs input::-webkit-outer-spin-button,
.fig-item .fig-inputs input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.fig-item .fig-inputs input:focus { outline:none; border-color:#533afd; }
.fig-item .fig-inputs .qty-out { color:#4ade80; border-color:#2a3a2a; }
.fig-item .fig-inputs .qty-want { color:#f87171; border-color:#3a2a2a; }
.fig-item.has-out { border-color:#4ade8044; }
.fig-item.has-want { border-color:#f8717144; }
.fig-item.has-both { border-color:#f59e0b44; }

.btn-row { display:flex; gap:8px; margin-top:16px; }
.btn { flex:1; padding:10px; border-radius:8px; border:none; font-size:0.9rem; font-weight:600; cursor:pointer; }
.btn-primary { background:#533afd; color:#fff; }
.btn-ghost { background:#1e1e2e; color:#999; }
.btn-trade { background:#f59e0b; color:#0a0a0f; }
.btn-trade:disabled { background:#3d3d2e; color:#666; cursor:not-allowed; }
.btn-add { display:block; width:100%; margin-top:12px; padding:10px; border-radius:8px; border:1px dashed #2a2a3a; background:transparent; color:#888; cursor:pointer; font-size:0.85rem; }
.btn-add:hover { border-color:#533afd; color:#a99bff; }

/* Trade Modal */
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:500; display:flex; align-items:center; justify-content:center; }
.modal { background:#13131a; border:1px solid #2a2a3a; border-radius:16px; padding:20px; max-width:500px; width:95%; max-height:90vh; overflow-y:auto; }
.modal h2 { font-size:1.1rem; color:#fff; margin-bottom:8px; }
.modal .match-section { margin:12px 0; }
.modal .match-section h4 { font-size:0.8rem; color:#888; margin-bottom:8px; }
.modal .match-grid { display:flex; flex-wrap:wrap; gap:8px; }
.modal .match-item { width:64px; text-align:center; cursor:pointer; padding:3px; border-radius:8px; border:2px solid transparent; }
.modal .match-item img { width:100%; height:50px; object-fit:contain; border-radius:4px; background:#0d0d15; }
.modal .match-item .m-name { font-size:0.55rem; color:#666; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.modal .match-item.picked { border-color:#f59e0b; background:rgba(245,158,11,0.1); }
.modal .modal-actions { display:flex; gap:8px; margin-top:16px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:10px 24px; border-radius:20px; background:#1a2a1a; color:#4ade80; font-size:0.85rem; z-index:600; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
.toast.error { background:#2a1a1a; color:#f87171; }

.no-data { text-align:center; color:#555; padding:40px; }

@media (max-width:600px) { .fig-item { width:60px; } .fig-item img { height:48px; } .modal { padding:14px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔄 LT 04 OL 交換平台 🔄</h1>
    <div class="sub">Link Travelers 扭蛋交換 — 換貨配對系統</div>
    <div class="me-badge" id="meBadge" style="display:none"></div>
  </div>

  <!-- Tabs -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('summary')">📋 所有人</button>
    <button class="tab-btn" onclick="switchTab('requests')">✅ 換貨紀錄 <span class="badge" id="reqBadge" style="display:none">0</span></button>
  </div>

  <!-- Summary View -->
  <div id="tabSummary"></div>

  <!-- Requests View -->
  <div id="tabRequests" style="display:none"></div>

  <!-- Edit Panel (hidden) -->
  <div class="edit-panel" id="editPanel" style="display:none">
    <h2 id="editTitle">📝 你嘅 Trade List</h2>
    <input id="editName" placeholder="你個名" maxlength="20">
    <input id="editContact" placeholder="電話號碼（用作識別，同號碼會merge）" maxlength="20">
    <div class="set-section"><h3>🧪 Side C（錬金術師／魔法系）</h3><div class="fig-grid" id="figGridC"></div></div>
    <div class="set-section"><h3>⚔️ Side G（聖域の騎士／魔法系）</h3><div class="fig-grid" id="figGridG"></div></div>
    <div class="set-section"><h3>🐺 KEMONO（獸人 Selection 04）</h3><div class="fig-grid" id="figGridK"></div></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">💾 Save</button>
    </div>
  </div>

  <!-- Trade Modal (hidden) -->
  <div class="modal-overlay" id="tradeModal" style="display:none">
    <div class="modal">
      <h2 id="tradeTitle">🔄 發起換貨</h2>
      <div class="match-section">
        <h4 style="color:#4ade80">📤 你可以俾佢嘅（你出 ∩ 佢徵）</h4>
        <div class="match-grid" id="myOffers"></div>
      </div>
      <div class="match-section">
        <h4 style="color:#f87171">📥 佢可以俾你嘅（你徵 ∩ 佢出）</h4>
        <div class="match-grid" id="theirOffers"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeTrade()">Cancel</button>
        <button class="btn btn-trade" id="sendTradeBtn" onclick="sendTradeRequest()" disabled>📨 發送換貨請求</button>
      </div>
    </div>
  </div>

  <button class="btn-add" onclick="startAdd()">+ 新增／編輯你嘅 Trade List</button>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase -->

<script>
firebase.initializeApp({
  apiKey:"AIzaSyD4TFPRxsndWYMuqB1V6ST_i6e1F65EPLc",
  databaseURL:"https://lt-trading-default-rtdb.firebaseio.com/"

const db = firebase.database();

const ALL_FIGS = [
  {id:"c01",name:"錬金術師の少女【真】",img:"images/c01.jpg",set:"side-c"},
  {id:"c02",name:"おさげのウサギの獣人",img:"images/c02.jpg",set:"side-c"},

  {id:"c12",name:"錬金ベルトセット",img:"images/c12.jpg",set:"side-c"},

  {id:"c16",name:"錬金術師の少女【真】フェイスB",img:"images/c16.jpg",set:"side-c"},
  {id:"g01",name:"聖域の騎士【真】",img:"images/g01.jpg",set:"side-g"},
  {id:"g02",name:"クロネコの獣人",img:"images/g02.jpg",set:"side-g"},
  {id:"g03",name:"錬金の鎧【銀】（上）",img:"images/g03.jpg",set:"side-g"},
  {id:"g04",name:"錬金の鎧【銀】（下）",img:"images/g04.jpg",set:"side-g"},
  {id:"g05",name:"上級魔術師の服（下）",img:"images/g05.jpg",set:"side-g"},
  {id:"g06",name:"妖刀宵雷（ショウライ）",img:"images/g06.jpg",set:"side-g"},
  {id:"g07",name:"翠翼の聖斧",img:"images/g07.jpg",set:"side-g"},
  {id:"g08",name:"ルーンの槌",img:"images/g08.jpg",set:"side-g"},
  {id:"g09",name:"残火の短剣",img:"images/g09.jpg",set:"side-g"},
  {id:"g10",name:"ネコの獣人の服",img:"images/g10.jpg",set:"side-g"},
  {id:"g11",name:"マジックシールド",img:"images/g11.jpg",set:"side-g"},
  {id:"g12",name:"ネコの獣人の兜",img:"images/g12.jpg",set:"side-g"},
  {id:"g13",name:"妖精のマント【灰】",img:"images/g13.jpg",set:"side-g"},
  {id:"g14",name:"聖域の騎士【真】フェイスA",img:"images/g14.jpg",set:"side-g"},
  {id:"g15",name:"聖域の騎士フェイスA",img:"images/g15.jpg",set:"side-g"},
  {id:"g16",name:"聖域の騎士フェイスB",img:"images/g16.jpg",set:"side-g"},
  {id:"k01",name:"聖域の騎士（髪型替え）",img:"images/k01.jpg",set:"kemono"},
  {id:"k02",name:"錬金術師の少女（髪型替え）",img:"images/k02.jpg",set:"kemono"},
  {id:"k03",name:"ウサギの獣人",img:"images/k03.jpg",set:"kemono"},
  {id:"k04",name:"オオカミの獣人",img:"images/k04.jpg",set:"kemono"},
  {id:"k05",name:"眼鏡をかけたネコの獣人",img:"images/k05.jpg",set:"kemono"},
  {id:"k06",name:"キツネの獣人",img:"images/k06.jpg",set:"kemono"},
  {id:"k07",name:"聖域の守護獣",img:"images/k07.jpg",set:"kemono"},
];

let allUsers = {};
let allRequests = {};
let currentTab = 'summary';
let editMode = null;
let selections = {};
let tradeTarget = null;
let tradePicks = {myOffer: null, theirOffer: null};

const MY_PHONE = localStorage.getItem('lt_my_phone') || '';

// ── Realtime listeners ──
db.ref('users').on('value', snap => { allUsers = snap.val() || {}; refreshAll(); });
db.ref('requests').on('value', snap => { allRequests = snap.val() || {}; refreshAll(); });

function refreshAll() {
  if (currentTab === 'summary') renderSummary();
  if (currentTab === 'requests') renderRequests();
  updateBadges();
  if (MY_PHONE && allUsers[MY_PHONE]) {
    document.getElementById('meBadge').style.display = 'inline-block';
    document.getElementById('meBadge').textContent = '👤 ' + allUsers[MY_PHONE].name + '（你）';
  } else {
    document.getElementById('meBadge').style.display = 'none';
  }
}

function updateBadges() {
  const myReqs = Object.values(allRequests).filter(r => r.to === MY_PHONE && r.status === 'pending');
  const b = document.getElementById('reqBadge');
  if (myReqs.length) { b.style.display = 'inline'; b.textContent = myReqs.length; }
  else { b.style.display = 'none'; }
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (tab === 'summary') {
    document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
    document.getElementById('tabSummary').style.display = 'block';
    document.getElementById('tabRequests').style.display = 'none';
    renderSummary();
  } else {
    document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
    document.getElementById('tabSummary').style.display = 'none';
    document.getElementById('tabRequests').style.display = 'block';
    renderRequests();
  }
}

// ── Summary ──
function renderSummary() {
  const el = document.getElementById('tabSummary');
  const users = Object.entries(allUsers);
  if (!users.length) { el.innerHTML = '<div class="no-data">未有 trade list — 㩒下面 button 加入！</div>'; return; }

  // Helper: get merged out/want (supports legacy trades)
  function getOutWant(u) {
    const out = {}, want = {};
    if (u.out) Object.assign(out, u.out);
    if (u.want) Object.assign(want, u.want);
    if (u.trades) Object.entries(u.trades).forEach(([k,v]) => {
      if (v==='出') out[k]=(out[k]||0)+1;
      else if (v==='徵') want[k]=(want[k]||0)+1;
    });
    return {out, want};
  }

  function figImgs(figIds, qtyObj, cls) {
    if (!figIds.length) return '<span class="st-empty">—</span>';
    return `<div class="st-figs">${figIds.map(id => {
      const f = ALL_FIGS.find(x => x.id===id);
      if (!f) return '';
      const q = qtyObj[id]||1;
      return `<span class="st-fig"><img src="${f.img}" title="${f.name}" onerror="this.style.display='none'">${q>1?`<span class="st-qty ${cls}">${q}</span>`:''}</span>`;
    }).join('')}</div>`;
  }

  let html = `<table class="summary-table"><thead><tr><th style="width:25%">人</th><th style="width:37%">📥 收（徵）</th><th style="width:38%">📤 出</th></tr></thead><tbody>`;

  users.forEach(([key, u]) => {
    const {out, want} = getOutWant(u);
    const outIds = Object.keys(out).filter(k => out[k]>0);
    const wantIds = Object.keys(want).filter(k => want[k]>0);
    const isMe = (key === MY_PHONE);

    html += `<tr>
      <td>
        <div class="st-name">${esc(u.name)}${isMe?' <span class="st-me">(你)</span>':''}</div>
        <div class="st-action">
          <button class="btn-sm" onclick="startEdit('${key}')">✏️</button>
          <button class="btn-sm danger" onclick="delUser('${key}','${escAttr(u.name)}')">🗑️</button>
          ${!isMe?`<button class="btn-sm trade" onclick="startTrade('${key}')">🔄 換</button>`:''}
        </div>
      </td>
      <td class="st-col-want">${figImgs(wantIds, want, 'want-qty')}</td>
      <td class="st-col-out">${figImgs(outIds, out, 'out-qty')}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

// ── Trade Modal ──
function startTrade(targetPhone) {
  if (!MY_PHONE) { toast('請先加入你嘅 Trade List！', true); return; }
  const me = allUsers[MY_PHONE];
  const them = allUsers[targetPhone];
  if (!me || !them) { toast('Data error', true); return; }

  // Helper: get effective out/want from user (supports legacy trades too)
  function getOut(u) { const o={}; if(u.out)Object.assign(o,u.out); if(u.trades)Object.entries(u.trades).forEach(([k,v])=>{if(v==='出')o[k]=(o[k]||0)+1}); return o; }
  function getWant(u) { const w={}; if(u.want)Object.assign(w,u.want); if(u.trades)Object.entries(u.trades).forEach(([k,v])=>{if(v==='徵')w[k]=(w[k]||0)+1}); return w; }

  const myOut = getOut(me), myWant = getWant(me);
  const theirOut = getOut(them), theirWant = getWant(them);

  tradeTarget = targetPhone;
  tradePicks = {myOffer: null, theirOffer: null};

  // My "出" ∩ Their "徵"
  const myOfferFigs = ALL_FIGS.filter(f => myOut[f.id] && theirWant[f.id]);
  // My "徵" ∩ Their "出"
  const theirOfferFigs = ALL_FIGS.filter(f => myWant[f.id] && theirOut[f.id]);

  document.getElementById('tradeTitle').textContent = '🔄 同 ' + them.name + ' 換貨';

  document.getElementById('myOffers').innerHTML = myOfferFigs.length
    ? myOfferFigs.map(f => `<div class="match-item" id="pick_${f.id}" onclick="pickTrade('myOffer','${f.id}')"><img src="${f.img}" onerror="this.style.display='none'"><div class="m-name">${f.name.substring(0,8)}</div></div>`).join('')
    : '<span style="color:#444;font-size:0.8rem">冇 match — 你嘅「出」同佢嘅「徵」冇重疊</span>';

  document.getElementById('theirOffers').innerHTML = theirOfferFigs.length
    ? theirOfferFigs.map(f => `<div class="match-item" id="pick_${f.id}" onclick="pickTrade('theirOffer','${f.id}')"><img src="${f.img}" onerror="this.style.display='none'"><div class="m-name">${f.name.substring(0,8)}</div></div>`).join('')
    : '<span style="color:#444;font-size:0.8rem">冇 match — 佢嘅「出」同你嘅「徵」冇重疊</span>';

  updateTradeBtn();
  document.getElementById('tradeModal').style.display = 'flex';
}

function pickTrade(which, figId) {
  if (tradePicks[which] === figId) { tradePicks[which] = null; }
  else { tradePicks[which] = figId; }
  document.querySelectorAll('#myOffers .match-item, #theirOffers .match-item').forEach(el => el.classList.remove('picked'));
  if (tradePicks.myOffer) document.getElementById('pick_'+tradePicks.myOffer)?.classList.add('picked');
  if (tradePicks.theirOffer) document.getElementById('pick_'+tradePicks.theirOffer)?.classList.add('picked');
  updateTradeBtn();
}

function updateTradeBtn() {
  const ok = tradePicks.myOffer && tradePicks.theirOffer;
  document.getElementById('sendTradeBtn').disabled = !ok;
}

function closeTrade() {
  document.getElementById('tradeModal').style.display = 'none';
  tradeTarget = null;
  tradePicks = {myOffer: null, theirOffer: null};
}

function sendTradeRequest() {
  if (!tradePicks.myOffer || !tradePicks.theirOffer) return toast('請揀要換嘅 items', true);
  const me = allUsers[MY_PHONE];
  const them = allUsers[tradeTarget];

  const myFig = ALL_FIGS.find(f => f.id === tradePicks.myOffer);
  const theirFig = ALL_FIGS.find(f => f.id === tradePicks.theirOffer);

  db.ref('requests').push({
    from: MY_PHONE,
    to: tradeTarget,
    from_name: me.name,
    to_name: them.name,
    from_gives: {id: tradePicks.myOffer, name: myFig.name, img: myFig.img},
    to_gives: {id: tradePicks.theirOffer, name: theirFig.name, img: theirFig.img},
    status: 'pending',
    created_at: Date.now()
  }).then(() => {
    closeTrade();
    toast('✅ 換貨請求已發送！');
  }).catch(() => toast('Error', true));
}

// ── Requests View ──
function renderRequests() {
  const el = document.getElementById('tabRequests');
  const allReqs = Object.entries(allRequests).sort((a,b) => b[1].created_at - a[1].created_at);

  // Show: pending TO ME + all accepted/rejected
  const visibleReqs = allReqs.filter(([rid, r]) => {
    if (r.status === 'pending' && r.to === MY_PHONE) return true; // I need to respond
    if (r.status === 'accepted' || r.status === 'rejected') return true; // history
    return false;
  });

  if (!visibleReqs.length) { el.innerHTML = '<div class="no-data">未有換貨紀錄</div>'; return; }

  el.innerHTML = visibleReqs.map(([rid, r]) => {
    const isToMe = r.to === MY_PHONE;
    const isFromMe = r.from === MY_PHONE;
    const statusLabel = {pending:'⏳ 等緊回覆', accepted:'✅ 已接受', rejected:'❌ 已拒絕'}[r.status] || r.status;

    let actionHtml = '';
    if (r.status === 'pending' && isToMe) {
      actionHtml = `<div class="r-actions">
        <button class="btn-accept" onclick="acceptReq('${rid}')">✅ 接受換貨</button>
        <button class="btn-reject" onclick="rejectReq('${rid}')">❌ 拒絕</button>
      </div>`;
    }

    const fg = r.from_gives, tg = r.to_gives;
    return `<div class="req-card">
      <div class="r-header">
        <span class="r-title">${r.from_name} ↔ ${r.to_name} · ${statusLabel}</span>
        <span style="color:#555;font-size:0.7rem">${new Date(r.created_at).toLocaleDateString('zh-HK')}</span>
      </div>
      <div class="r-row">
        <span class="r-label" style="color:#4ade80">${r.from_name} 出：</span>
        <div class="r-items"><img src="${fg.img}" title="${fg.name}" onerror="this.style.display='none'"><span style="font-size:0.7rem;color:#aaa">${fg.name}</span></div>
      </div>
      <div class="r-row">
        <span class="r-label" style="color:#4ade80">${r.to_name} 出：</span>
        <div class="r-items"><img src="${tg.img}" title="${tg.name}" onerror="this.style.display='none'"><span style="font-size:0.7rem;color:#aaa">${tg.name}</span></div>
      </div>
      ${actionHtml}
    </div>`;
  }).join('');
}

function acceptReq(rid) {
  const r = allRequests[rid];
  if (!r || r.status !== 'pending' || r.to !== MY_PHONE) return;

  const fromUser = allUsers[r.from] || {};
  const toUser = allUsers[r.to] || {};

  // Copy out/want objects (support legacy trades format)
  function getCopy(obj, key) {
    if (!obj[key]) return {};
    return JSON.parse(JSON.stringify(obj[key]));
  }
  const fromOut = getCopy(fromUser, 'out'), fromWant = getCopy(fromUser, 'want');
  const toOut = getCopy(toUser, 'out'), toWant = getCopy(toUser, 'want');

  // From user: decrement "出" for the item they gave
  const fgId = r.from_gives.id;
  if (fromOut[fgId]) { fromOut[fgId]--; if (fromOut[fgId]<=0) delete fromOut[fgId]; }
  // From user: decrement "徵" for the item they received
  const tgId = r.to_gives.id;
  if (fromWant[tgId]) { fromWant[tgId]--; if (fromWant[tgId]<=0) delete fromWant[tgId]; }

  // To user: decrement "出" for the item they gave
  if (toOut[tgId]) { toOut[tgId]--; if (toOut[tgId]<=0) delete toOut[tgId]; }
  // To user: decrement "徵" for the item they received
  if (toWant[fgId]) { toWant[fgId]--; if (toWant[fgId]<=0) delete toWant[fgId]; }

  const updates = {};
  updates['users/' + r.from + '/out'] = fromOut;
  updates['users/' + r.from + '/want'] = fromWant;
  updates['users/' + r.to + '/out'] = toOut;
  updates['users/' + r.to + '/want'] = toWant;
  updates['requests/' + rid + '/status'] = 'accepted';

  db.ref().update(updates).then(() => {
    switchTab('summary');
    toast('✅ 換貨完成！');
  }).catch(() => toast('Error', true));
}

function rejectReq(rid) {
  if (!confirm('確定拒絕？')) return;
  db.ref('requests/' + rid + '/status').set('rejected').then(() => toast('已拒絕'));
}

// ── Build figure grids ──
function buildFigGrids() {
  ['C','G','K'].forEach(side => {
    const grid = document.getElementById('figGrid'+side);
    if (!grid) return;
    const setMap = {C:'side-c', G:'side-g', K:'kemono'};
    const figs = ALL_FIGS.filter(f => f.set === setMap[side]);
    grid.innerHTML = figs.map(f => {
      const qty = selections[f.id] || {out:0, want:0};
      const hasOut = qty.out > 0, hasWant = qty.want > 0;
      let cls = '';
      if (hasOut && hasWant) cls = 'has-both';
      else if (hasOut) cls = 'has-out';
      else if (hasWant) cls = 'has-want';
      return `<div class="fig-item ${cls}" data-id="${f.id}">
        <img src="${f.img}" onerror="this.style.display='none'">
        <div class="fig-name">${f.name.substring(0,10)}</div>
        <div class="fig-inputs">
          <label>📤<input type="number" class="qty-out" value="${qty.out||''}" min="0" max="99" onchange="updateQty('${f.id}','out',this.value)"></label>
          <label>📥<input type="number" class="qty-want" value="${qty.want||''}" min="0" max="99" onchange="updateQty('${f.id}','want',this.value)"></label>
        </div>
      </div>`;
    }).join('');
  });
}

function updateQty(figId, type, val) {
  const v = parseInt(val) || 0;
  if (!selections[figId]) selections[figId] = {out:0, want:0};
  selections[figId][type] = Math.max(0, Math.min(99, v));
  // Update border without rebuilding grid
  const el = document.querySelector(`.fig-item[data-id="${figId}"]`);
  if (el) {
    const q = selections[figId];
    el.classList.remove('has-out','has-want','has-both');
    if (q.out > 0 && q.want > 0) el.classList.add('has-both');
    else if (q.out > 0) el.classList.add('has-out');
    else if (q.want > 0) el.classList.add('has-want');
  }
}

// ── Edit ──
function startAdd() {
  editMode = null;
  selections = {};
  document.getElementById('editName').value = '';
  document.getElementById('editContact').value = MY_PHONE || '';
  document.getElementById('editTitle').textContent = '📝 你嘅 Trade List';
  showEdit();
}
function startEdit(key) {
  editMode = key;
  const u = allUsers[key];
  document.getElementById('editName').value = u.name;
  document.getElementById('editContact').value = u.contact || key;
  // Merge out + want into selections {figId: {out:N, want:N}}
  selections = {};
  if (u.out) Object.keys(u.out).forEach(figId => { if (!selections[figId]) selections[figId] = {out:0,want:0}; selections[figId].out = u.out[figId]; });
  if (u.want) Object.keys(u.want).forEach(figId => { if (!selections[figId]) selections[figId] = {out:0,want:0}; selections[figId].want = u.want[figId]; });
  // Handle legacy trades format too
  if (u.trades) {
    Object.entries(u.trades).forEach(([figId, v]) => {
      if (!selections[figId]) selections[figId] = {out:0,want:0};
      if (v === '出') selections[figId].out = (selections[figId].out || 0) + 1;
      else if (v === '徵') selections[figId].want = (selections[figId].want || 0) + 1;
    });
  }
  document.getElementById('editTitle').textContent = '✏️ 編輯 Trade List';
  showEdit();
}
function showEdit() {
  document.getElementById('editPanel').style.display = 'block';
  buildFigGrids();
  document.getElementById('editName').focus();
}
function cancelEdit() {
  document.getElementById('editPanel').style.display = 'none';
  editMode = null; selections = {};
}

function saveUser() {
  const name = document.getElementById('editName').value.trim();
  const contact = document.getElementById('editContact').value.trim();
  if (!name) return toast('請填名', true);
  if (!contact) return toast('請填電話', true);

  const phoneKey = contact.replace(/[\s\-()]/g, '');

  const out = {}, want = {};
  Object.entries(selections).forEach(([figId, qty]) => {
    if (qty.out > 0) out[figId] = qty.out;
    if (qty.want > 0) want[figId] = qty.want;
  });

  if (editMode && editMode !== phoneKey) {
    db.ref('users/' + editMode).remove();
  }
  db.ref('users/' + phoneKey).set({name, contact: phoneKey, out, want}).then(() => {
    localStorage.setItem('lt_my_phone', phoneKey);
    cancelEdit(); toast('✅ Saved!');
  });
}

function delUser(key, name) {
  if (!confirm('Delete ' + name + '?')) return;
  db.ref('users/' + key).remove();
  toast('🗑️ Deleted');
}

// ── Helpers ──
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function toast(msg, isErr) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.className = 'toast show' + (isErr?' error':''); setTimeout(()=>t.classList.remove('show'), 2500);
}

// init
refreshAll();
</script>
