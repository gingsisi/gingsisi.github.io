<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT Trade Board 🔄</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }

.header { text-align:center; padding:20px 0 8px; border-bottom:1px solid #1e1e2e; margin-bottom:16px; }
.header h1 { font-size:1.4rem; color:#fff; }
.header .sub { font-size:0.8rem; color:#888; margin-top:4px; }

/* ── Summary Cards ── */
.user-card { background:#13131a; border:1px solid #1e1e2e; border-radius:12px; padding:16px; margin-bottom:12px; }
.user-card .u-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.user-card .u-name { font-weight:700; color:#fff; font-size:1rem; }
.user-card .u-contact { color:#888; font-size:0.8rem; }
.user-card .u-actions { display:flex; gap:8px; }
.user-card .u-edit-btn, .user-card .u-del-btn { background:none; border:1px solid #2a2a3a; color:#888; padding:4px 12px; border-radius:14px; cursor:pointer; font-size:0.75rem; }
.user-card .u-edit-btn:hover { border-color:#533afd; color:#a99bff; }
.user-card .u-del-btn:hover { border-color:#5a1a2a; color:#f87171; }
.user-card .u-section { margin-bottom:6px; }
.user-card .u-label { font-size:0.7rem; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.user-card .u-label.out { color:#4ade80; }
.user-card .u-label.want { color:#f87171; }
.user-card .u-imgs { display:flex; flex-wrap:wrap; gap:6px; }
.user-card .u-imgs img { width:50px; height:50px; object-fit:contain; border-radius:6px; background:#0d0d15; }

.no-users { text-align:center; color:#555; padding:40px; }

/* ── Edit Form ── */
.edit-panel { background:#13131a; border:1px solid #1e1e2e; border-radius:12px; padding:16px; margin-bottom:16px; }
.edit-panel h2 { font-size:1rem; color:#fff; margin-bottom:12px; }
.edit-panel input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #2a2a3a; background:#0d0d15; color:#e0e0e0; font-size:0.9rem; margin-bottom:8px; }
.edit-panel input:focus { outline:none; border-color:#533afd; }

.set-section { margin-top:12px; }
.set-section h3 { font-size:0.85rem; color:#aaa; margin-bottom:8px; }
.fig-grid { display:flex; flex-wrap:wrap; gap:8px; }
.fig-item { width:70px; text-align:center; cursor:pointer; padding:4px; border-radius:8px; border:2px solid transparent; transition:all .15s; }
.fig-item img { width:100%; height:56px; object-fit:contain; border-radius:4px; background:#0d0d15; }
.fig-item .fig-name { font-size:0.6rem; color:#666; margin-top:2px; line-height:1.1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fig-item.selected-out { border-color:#4ade80; background:rgba(74,222,128,0.08); }
.fig-item.selected-out .fig-name { color:#4ade80; }
.fig-item.selected-want { border-color:#f87171; background:rgba(248,113,113,0.08); }
.fig-item.selected-want .fig-name { color:#f87171; }

.btn-row { display:flex; gap:8px; margin-top:16px; }
.btn { flex:1; padding:10px; border-radius:8px; border:none; font-size:0.9rem; font-weight:600; cursor:pointer; }
.btn-primary { background:#533afd; color:#fff; }
.btn-ghost { background:#1e1e2e; color:#999; }
.btn-add { display:block; width:100%; margin-top:12px; padding:10px; border-radius:8px; border:1px dashed #2a2a3a; background:transparent; color:#888; cursor:pointer; font-size:0.85rem; }
.btn-add:hover { border-color:#533afd; color:#a99bff; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 24px; border-radius:20px; background:#1a2a1a; color:#4ade80; font-size:0.85rem; z-index:200; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
.toast.error { background:#2a1a1a; color:#f87171; }

@media (max-width:600px) { .fig-item { width:60px; } .fig-item img { height:48px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔄 LT Trade Board</h1><div class="sub">Link Travelers 換蛋平台</div></div>

  <!-- Edit Panel (hidden by default) -->
  <div class="edit-panel" id="editPanel" style="display:none">
    <h2 id="editTitle">📝 你嘅 Trade List</h2>
    <input id="editName" placeholder="你個名" maxlength="20">
    <input id="editContact" placeholder="聯絡方式（e.g. WhatsApp）" maxlength="40">

    <div class="set-section">
      <h3>🧪 Side C（錬金術師／魔法系）</h3>
      <div class="fig-grid" id="figGridC"></div>
    </div>
    <div class="set-section">
      <h3>⚔️ Side G（聖域の騎士／魔法系）</h3>
      <div class="fig-grid" id="figGridG"></div>
    </div>
    <div class="set-section">
      <h3>🐺 KEMONO（獸人 Selection 04）</h3>
      <div class="fig-grid" id="figGridK"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">💾 Save</button>
    </div>
  </div>

  <!-- Summary -->
  <div id="summary"></div>
  <button class="btn-add" onclick="startAdd()">+ 新增／編輯你嘅 Trade List</button>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyD4TFPRxsndWYMuqB1V6ST_i6e1F65EPLc",
  databaseURL:"https://lt-trading-default-rtdb.firebaseio.com/"
});
const db = firebase.database();

const ALL_FIGS = [
  {id:"c01",name:"錬金術師の少女【真】",img:"images/c01.jpg",set:"side-c"},
  {id:"c02",name:"おさげのウサギの獣人",img:"images/c02.jpg",set:"side-c"},
  {id:"c03",name:"術師のコート【桃】",img:"images/c03.jpg",set:"side-c"},
  {id:"c04",name:"錬金術師の服【赤】",img:"images/c04.jpg",set:"side-c"},
  {id:"c05",name:"上級魔術師の服（上）",img:"images/c05.jpg",set:"side-c"},
  {id:"c06",name:"獣人の服【白】",img:"images/c06.jpg",set:"side-c"},
  {id:"c07",name:"大型リュックサック",img:"images/c07.jpg",set:"side-c"},
  {id:"c08",name:"術師の帽子",img:"images/c08.jpg",set:"side-c"},
  {id:"c09",name:"術師の杖",img:"images/c09.jpg",set:"side-c"},
  {id:"c10",name:"氷霜の弓矢",img:"images/c10.jpg",set:"side-c"},
  {id:"c11",name:"ポーションセット",img:"images/c11.jpg",set:"side-c"},
  {id:"c12",name:"錬金ベルトセット",img:"images/c12.jpg",set:"side-c"},
  {id:"c13",name:"獣人の帽子【灰】",img:"images/c13.jpg",set:"side-c"},
  {id:"c14",name:"波濤の剣",img:"images/c14.jpg",set:"side-c"},
  {id:"c15",name:"錬金術師の少女【真】フェイスA",img:"images/c15.jpg",set:"side-c"},
  {id:"c16",name:"錬金術師の少女【真】フェイスB",img:"images/c16.jpg",set:"side-c"},
  {id:"g01",name:"聖域の騎士【真】",img:"images/g01.jpg",set:"side-g"},
  {id:"g02",name:"クロネコの獣人",img:"images/g02.jpg",set:"side-g"},
  {id:"g03",name:"錬金の鎧【銀】（上）",img:"images/g03.jpg",set:"side-g"},
  {id:"g04",name:"錬金の鎧【銀】（下）",img:"images/g04.jpg",set:"side-g"},
  {id:"g05",name:"上級魔術師の服（下）",img:"images/g05.jpg",set:"side-g"},
  {id:"g06",name:"妖刀宵雷（ショウライ）",img:"images/g06.jpg",set:"side-g"},
  {id:"g07",name:"翠翼の聖斧",img:"images/g07.jpg",set:"side-g"},
  {id:"g08",name:"ルーンの槌",img:"images/g08.jpg",set:"side-g"},
  {id:"g09",name:"残火の短剣",img:"images/g09.jpg",set:"side-g"},
  {id:"g10",name:"ネコの獣人の服",img:"images/g10.jpg",set:"side-g"},
  {id:"g11",name:"マジックシールド",img:"images/g11.jpg",set:"side-g"},
  {id:"g12",name:"ネコの獣人の兜",img:"images/g12.jpg",set:"side-g"},
  {id:"g13",name:"妖精のマント【灰】",img:"images/g13.jpg",set:"side-g"},
  {id:"g14",name:"聖域の騎士【真】フェイスA",img:"images/g14.jpg",set:"side-g"},
  {id:"g15",name:"聖域の騎士フェイスA",img:"images/g15.jpg",set:"side-g"},
  {id:"g16",name:"聖域の騎士フェイスB",img:"images/g16.jpg",set:"side-g"},
  {id:"k01",name:"聖域の騎士（髪型替え）",img:"images/k01.jpg",set:"kemono"},
  {id:"k02",name:"錬金術師の少女（髪型替え）",img:"images/k02.jpg",set:"kemono"},
  {id:"k03",name:"ウサギの獣人",img:"images/k03.jpg",set:"kemono"},
  {id:"k04",name:"オオカミの獣人",img:"images/k04.jpg",set:"kemono"},
  {id:"k05",name:"眼鏡をかけたネコの獣人",img:"images/k05.jpg",set:"kemono"},
  {id:"k06",name:"キツネの獣人",img:"images/k06.jpg",set:"kemono"},
  {id:"k07",name:"聖域の守護獣",img:"images/k07.jpg",set:"kemono"},
];

let allUsers = {};
let editMode = null; // null or user key
let selections = {}; // {figId: '出'|'徵'|null}

// ── Real-time ──
db.ref('users').on('value', snap => {
  allUsers = snap.val() || {};
  renderSummary();
  buildFigGrids();
});

// ── Build figure grids ──
function buildFigGrids() {
  ['C','G','K'].forEach(side => {
    const grid = document.getElementById('figGrid'+side);
    const setMap = {C:'side-c', G:'side-g', K:'kemono'};
    const figs = ALL_FIGS.filter(f => f.set === setMap[side]);
    grid.innerHTML = figs.map(f => {
      const sel = selections[f.id];
      let cls = '';
      if (sel === '出') cls = 'selected-out';
      else if (sel === '徵') cls = 'selected-want';
      return `<div class="fig-item ${cls}" onclick="toggleFig('${f.id}')" title="${f.name}">
        <img src="${f.img}" onerror="this.style.display='none'">
        <div class="fig-name">${f.name.substring(0,10)}</div>
      </div>`;
    }).join('');
  });
}

function toggleFig(figId) {
  if (!selections[figId] || selections[figId] === '徵') selections[figId] = '出';
  else if (selections[figId] === '出') selections[figId] = '徵';
  else selections[figId] = null;
  buildFigGrids();
}

// ── Summary ──
function renderSummary() {
  const el = document.getElementById('summary');
  const users = Object.entries(allUsers);
  if (!users.length) { el.innerHTML = '<div class="no-users">未有 trade list — 㩒下面 button 加入！</div>'; return; }

  el.innerHTML = users.map(([key, u]) => {
    const trades = u.trades || {};
    const outFigs = ALL_FIGS.filter(f => trades[f.id] === '出');
    const wantFigs = ALL_FIGS.filter(f => trades[f.id] === '徵');

    return `<div class="user-card">
      <div class="u-header">
        <div><span class="u-name">${esc(u.name)}</span> <span class="u-contact">${esc(u.contact)}</span></div>
        <div class="u-actions">
          <button class="u-edit-btn" onclick="startEdit('${key}')">✏️ Edit</button>
          <button class="u-del-btn" onclick="delUser('${key}','${escAttr(u.name)}')">🗑️</button>
        </div>
      </div>
      <div class="u-section">
        <div class="u-label out">📤 出（有多可換）</div>
        <div class="u-imgs">${outFigs.length ? outFigs.map(f => `<img src="${f.img}" title="${f.name}" onerror="this.style.display='none'">`).join('') : '<span style="color:#444;font-size:0.75rem">—</span>'}</div>
      </div>
      <div class="u-section">
        <div class="u-label want">📥 徵（想換入）</div>
        <div class="u-imgs">${wantFigs.length ? wantFigs.map(f => `<img src="${f.img}" title="${f.name}" onerror="this.style.display='none'">`).join('') : '<span style="color:#444;font-size:0.75rem">—</span>'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Edit ──
function startAdd() {
  editMode = null;
  selections = {};
  document.getElementById('editName').value = '';
  document.getElementById('editContact').value = '';
  document.getElementById('editTitle').textContent = '📝 你嘅 Trade List';
  showEdit();
}
function startEdit(key) {
  editMode = key;
  const u = allUsers[key];
  document.getElementById('editName').value = u.name;
  document.getElementById('editContact').value = u.contact;
  selections = {...(u.trades || {})};
  document.getElementById('editTitle').textContent = '✏️ 編輯 Trade List';
  showEdit();
}
function showEdit() {
  document.getElementById('editPanel').style.display = 'block';
  buildFigGrids();
  document.getElementById('editName').focus();
}
function cancelEdit() {
  document.getElementById('editPanel').style.display = 'none';
  editMode = null; selections = {};
}

function saveUser() {
  const name = document.getElementById('editName').value.trim();
  const contact = document.getElementById('editContact').value.trim();
  if (!name) return toast('請填名', true);
  if (!contact) return toast('請填聯絡方式', true);

  // Clean: only save non-null selections
  const trades = {};
  Object.entries(selections).forEach(([k,v]) => { if (v) trades[k] = v; });

  if (editMode) {
    db.ref('users/' + editMode).update({name, contact, trades});
  } else {
    db.ref('users').push({name, contact, trades});
  }
  cancelEdit(); toast('✅ Saved!');
}

function delUser(key, name) {
  if (!confirm('Delete ' + name + '?')) return;
  db.ref('users/' + key).remove();
  toast('🗑️ Deleted');
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function toast(msg, isErr) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.className = 'toast show' + (isErr?' error':''); setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
