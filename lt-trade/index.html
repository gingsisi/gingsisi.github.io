<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT Trade Board 🔄</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0a0a0f; color: #e0e0e0; min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }

.header { text-align: center; padding: 24px 0 8px; border-bottom: 1px solid #1e1e2e; margin-bottom: 16px; }
.header h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
.header .sub { font-size: 0.85rem; color: #888; margin-top: 4px; }

.tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 8px 24px; border-radius: 20px; border: 1px solid #2a2a3a; background: #13131a; color: #999; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all .2s; }
.tab:hover { border-color: #533afd; color: #ccc; }
.tab.active { background: #533afd; border-color: #533afd; color: #fff; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.card { background: #13131a; border: 1px solid #1e1e2e; border-radius: 12px; overflow: hidden; transition: border-color .2s; }
.card:hover { border-color: #2a2a4a; }
.card-img { width: 100%; height: 200px; object-fit: contain; background: #0d0d15; display: flex; align-items: center; justify-content: center; }
.card-img img { max-width: 100%; max-height: 100%; }
.card-img .no-img { color: #555; font-size: 0.8rem; }
.card-body { padding: 12px; }
.card-title { font-weight: 600; font-size: 0.95rem; color: #fff; margin-bottom: 10px; }

.trade-section { margin-bottom: 8px; }
.trade-label { font-size: 0.75rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.trade-label.out { color: #4ade80; }
.trade-label.want { color: #f87171; }

.trade-list { list-style: none; }
.trade-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: 6px; background: #1a1a25; margin-bottom: 3px; font-size: 0.82rem; }
.trade-item .info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
.trade-item .tname { color: #e0e0e0; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.trade-item .tcontact { color: #666; font-size: 0.75rem; }
.trade-item .tqty { color: #888; font-size: 0.75rem; background: #0d0d15; padding: 2px 8px; border-radius: 10px; }
.trade-item .del-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 0.75rem; padding: 2px 4px; border-radius: 4px; }
.trade-item .del-btn:hover { color: #f87171; background: #1a1015; }

.no-trades { color: #444; font-size: 0.75rem; font-style: italic; }

.add-btn { display: block; width: 100%; margin-top: 8px; padding: 6px; border-radius: 6px; border: 1px dashed #2a2a3a; background: transparent; color: #666; cursor: pointer; font-size: 0.8rem; transition: all .2s; }
.add-btn:hover { border-color: #533afd; color: #a99bff; background: #13131f; }

.modal-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #1a1a25; border: 1px solid #2a2a3a; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
.modal h3 { font-size: 1.1rem; color: #fff; margin-bottom: 16px; }
.modal label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a2a3a; background: #0d0d15; color: #e0e0e0; font-size: 0.9rem; }
.modal input:focus, .modal select:focus { outline: none; border-color: #533afd; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 20px; }
.modal .btn { flex:1; padding: 10px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
.modal .btn-primary { background: #533afd; color: #fff; }
.modal .btn-ghost { background: #1e1e2e; color: #999; }
.modal .btn-danger { background: #3d1520; color: #f87171; border: 1px solid #5a1a2a; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 20px; background: #1a2a1a; color: #4ade80; font-size: 0.85rem; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: #2a1a1a; color: #f87171; }

.del-hint { font-size: 0.8rem; color: #888; margin-bottom: 4px; }

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔄 LT Trade Board</h1>
    <div class="sub">Link Travelers 換蛋平台 · 出徵一目了然</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 id="modalTitle">我要放／徵</h3>
    <label>你個名</label><input id="addName" placeholder="e.g. Eric" maxlength="20">
    <label>聯絡方式</label><input id="addContact" placeholder="WhatsApp / @username" maxlength="40">
    <label>類型</label>
    <select id="addType"><option value="出">📤 出（我有，想放）</option><option value="徵">📥 徵（我想要）</option></select>
    <label>數量</label><input id="addQty" type="number" min="1" max="99" value="1">
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitTrade()">Submit</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal">
    <h3>🗑️ Delete Post</h3>
    <p class="del-hint">請輸入你個名嚟確認 delete（必須同出 post 時一致）</p>
    <input id="delName" placeholder="Your name" maxlength="20">
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeDelModal()">Cancel</button>
      <button class="btn btn-danger" id="delConfirmBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://web-production-33b19.up.railway.app';

let config = null;
let trades = [];
let currentSet = null;
let pendingFigure = null;
let pendingDelete = null;

async function init() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div style="text-align:center;padding:40px;color:#888"><p style="font-size:1.2rem">⏳ Loading...</p><p style="font-size:0.8rem;margin-top:8px">連接伺服器中</p></div>';
  
  try {
    const resp = await fetch(API + '/api/lt/config');
    if (!resp.ok) throw new Error('API ' + resp.status);
    config = await resp.json();
    currentSet = config.sets[0].id;
    renderTabs();
    await loadSet(currentSet);
  } catch(e) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:#f87171"><p style="font-size:1.2rem">⚠️ 暫時連接唔到伺服器</p><p style="font-size:0.8rem;margin-top:8px;color:#888">可能 Railway 仲 deploy 緊，等 2-3 分鐘再試</p><button onclick="init()" style="margin-top:16px;padding:8px 24px;border-radius:20px;border:1px solid #533afd;background:#13131a;color:#a99bff;cursor:pointer;font-size:0.85rem">🔄 Retry</button></div>';
  }
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = config.sets.map(s =>
    `<button class="tab${s.id===currentSet?' active':''}" onclick="switchSet('${s.id}')">${s.name}</button>`
  ).join('');
}

async function switchSet(setId) { currentSet = setId; renderTabs(); await loadSet(setId); }

async function loadSet(setId) {
  const resp = await fetch(API + '/api/lt/trades/' + setId);
  trades = await resp.json();
  renderGrid(setId);
}

function renderGrid(setId) {
  const grid = document.getElementById('grid');
  const set = config.sets.find(s => s.id === setId);
  if (!set) { grid.innerHTML = '<p style="color:#555">Set not found</p>'; return; }

  grid.innerHTML = set.figures.map(fig => {
    const ft = trades.filter(t => t.figure_id === fig.id);
    const out = ft.filter(t => t.type==='出'), want = ft.filter(t => t.type==='徵');
    return `<div class="card">
      <div class="card-img">${fig.image ? `<img src="${fig.image}" alt="${esc(fig.name)}" onerror="this.parentElement.innerHTML='<span class=no-img>🖼️</span>'">` : '<span class="no-img">🖼️</span>'}</div>
      <div class="card-body">
        <div class="card-title">${esc(fig.name)}</div>
        <div class="trade-section"><div class="trade-label out">📤 出</div>${out.length ? tradeList(out) : '<div class="no-trades">未有</div>'}</div>
        <div class="trade-section"><div class="trade-label want">📥 徵</div>${want.length ? tradeList(want) : '<div class="no-trades">未有</div>'}</div>
        <button class="add-btn" onclick="openAdd('${fig.id}','${escAttr(fig.name)}')">+ 我要放／徵</button>
      </div>
    </div>`;
  }).join('');
}

function tradeList(items) {
  return '<ul class="trade-list">' + items.map(t =>
    `<li class="trade-item"><div class="info"><span class="tname">${esc(t.name)}</span><span class="tcontact">${esc(t.contact)}</span></div><span class="tqty">x${t.qty}</span><button class="del-btn" onclick="openDelete('${t.id}','${escAttr(t.name)}')" title="Delete">✕</button></li>`
  ).join('') + '</ul>';
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function openAdd(figId, figName) {
  pendingFigure = figId;
  document.getElementById('modalTitle').textContent = '📝 ' + figName;
  document.getElementById('addName').value = document.getElementById('addContact').value = '';
  document.getElementById('addType').value = '出'; document.getElementById('addQty').value = '1';
  document.getElementById('addModal').classList.add('show');
}
function closeModal() { document.getElementById('addModal').classList.remove('show'); pendingFigure = null; }

async function submitTrade() {
  const name = document.getElementById('addName').value.trim();
  const contact = document.getElementById('addContact').value.trim();
  const type = document.getElementById('addType').value;
  const qty = parseInt(document.getElementById('addQty').value) || 1;
  if (!name) return toast('請填你個名', true);
  if (!contact) return toast('請填聯絡方式', true);

  const resp = await fetch(API + '/api/lt/trades', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({figure_id:pendingFigure, set_id:currentSet, name, contact, type, qty})
  });
  if (!resp.ok) return toast('Error: ' + (await resp.json()).detail, true);
  closeModal(); toast('✅ Posted!'); await loadSet(currentSet);
}

function openDelete(tradeId) { pendingDelete = tradeId; document.getElementById('delName').value = ''; document.getElementById('delModal').classList.add('show'); }
function closeDelModal() { document.getElementById('delModal').classList.remove('show'); pendingDelete = null; }

async function confirmDelete() {
  const name = document.getElementById('delName').value.trim();
  if (!name) return toast('Please enter your name', true);
  const resp = await fetch(API + '/api/lt/trades/' + pendingDelete, {
    method: 'DELETE', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({trade_id:pendingDelete, name})
  });
  if (!resp.ok) return toast('❌ ' + (await resp.json()).detail, true);
  closeDelModal(); toast('🗑️ Deleted'); await loadSet(currentSet);
}
document.getElementById('delConfirmBtn').onclick = confirmDelete;
document.getElementById('addModal').onclick = function(e) { if (e.target===this) closeModal(); };
document.getElementById('delModal').onclick = function(e) { if (e.target===this) closeDelModal(); };

function toast(msg, isErr) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.className = 'toast show' + (isErr?' error':''); setTimeout(()=>t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
